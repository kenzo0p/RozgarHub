<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Full-bleed background so the icon works as a maskable icon too. -->
  <rect width="512" height="512" fill="#2563eb"/>
  <!-- The hub mark: a worker at the center, jobs within reach; the amber
       node on the thickest spoke is the match, made directly. Content stays
       inside the maskable safe zone (~40% radius from center). -->
  <g stroke="#ffffff" stroke-linecap="round">
    <line x1="256" y1="256" x2="414" y2="256" stroke-width="30"/>
    <line x1="256" y1="256" x2="177" y2="119" stroke-width="30"/>
    <line x1="256" y1="256" x2="98"  y2="256" stroke-width="30"/>
    <line x1="256" y1="256" x2="177" y2="393" stroke-width="30"/>
    <line x1="256" y1="256" x2="335" y2="393" stroke-width="30"/>
    <line x1="256" y1="256" x2="335" y2="119" stroke-width="38"/>
  </g>
  <g fill="#ffffff">
    <circle cx="414" cy="256" r="32"/>
    <circle cx="177" cy="119" r="32"/>
    <circle cx="98"  cy="256" r="32"/>
    <circle cx="177" cy="393" r="32"/>
    <circle cx="335" cy="393" r="32"/>
  </g>
  <circle cx="335" cy="119" r="42" fill="#f59e0b"/>
  <circle cx="256" cy="256" r="68" fill="#ffffff"/>
</svg>
