<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Full-bleed background so the icon works as a maskable icon too. -->
  <rect width="512" height="512" fill="#2563eb"/>
  <!-- Mark sits within the ~80% maskable safe zone. -->
  <text x="256" y="256" font-family="Arial, Helvetica, sans-serif" font-size="260"
        font-weight="800" fill="#ffffff" text-anchor="middle" dominant-baseline="central"
        letter-spacing="-8">R</text>
</svg>
