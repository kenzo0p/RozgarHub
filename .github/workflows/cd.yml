# CD Pipeline — Docker build & push on merge to main
#
# Builds production Docker images and pushes to GitHub Container Registry (ghcr.io).
# Can be extended with deploy steps for Render, Railway, AWS ECS, etc.

name: CD

on:
  push:
    branches: [main]
    # Only trigger on actual code changes, not docs
    paths-ignore:
      - '**.md'
      - '.github/ISSUE_TEMPLATE/**'
      - 'docs/**'

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository_owner }}/rozgarhub

jobs:
  build-and-push:
    name: Build & Push Docker Images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-api
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-frontend
          tags: |
            type=sha,prefix=
            type=raw,value=latest

      # ─── Build & Push Backend ──────────────────────────────────────────────
      - name: Build & push backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-api:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-api:${{ github.sha }}

      # ─── Build & Push Frontend ─────────────────────────────────────────────
      - name: Build & push frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-frontend:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-frontend:${{ github.sha }}

  # ─── Deploy ────────────────────────────────────────────────────────────────
  # Fires a deploy hook after images are pushed. Works with any platform that
  # redeploys on an HTTP POST (Render, Railway, Coolify, Portainer, etc.):
  #
  #   1. Create a deploy hook URL in your platform's dashboard
  #   2. Add it as a repo secret named DEPLOY_HOOK_URL
  #      (Settings → Secrets and variables → Actions → New repository secret)
  #
  # Until the secret is configured, this job runs but skips the trigger step,
  # so CD stays green without deploying anywhere.
  deploy:
    name: Deploy to Production
    needs: build-and-push
    runs-on: ubuntu-latest
    env:
      DEPLOY_HOOK_URL: ${{ secrets.DEPLOY_HOOK_URL }}
    steps:
      - name: Trigger deploy hook
        if: env.DEPLOY_HOOK_URL != ''
        run: curl -fsS -X POST "$DEPLOY_HOOK_URL"

      - name: No deploy target configured
        if: env.DEPLOY_HOOK_URL == ''
        run: echo "DEPLOY_HOOK_URL secret not set — images pushed to ghcr.io but no deploy triggered."
