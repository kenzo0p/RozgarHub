# docker-compose.yml — Development & Production orchestration
#
# Usage:
#   Development:  docker compose up
#   Production:   docker compose --profile production up -d
#   Rebuild:      docker compose up --build
#   Logs:         docker compose logs -f api
#   Stop:         docker compose down
#   Full cleanup: docker compose down -v (removes volumes too)

services:
  # ─── MongoDB ─────────────────────────────────────────────────────────────────
  mongodb:
    image: mongo:7
    container_name: rozgarhub-mongodb
    restart: unless-stopped
    ports:
      # Loopback-only: reachable from the host for local tooling, but NOT
      # exposed to the network — the API reaches it via the docker network.
      - "127.0.0.1:27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USERNAME:-admin}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD:-password}
      MONGO_INITDB_DATABASE: rozgarhub
    volumes:
      - mongodb_data:/data/db
    networks:
      - rozgarhub-network
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Redis ───────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: rozgarhub-redis
    restart: unless-stopped
    ports:
      # Loopback-only — Redis runs unauthenticated, never expose it publicly
      - "127.0.0.1:6379:6379"
    command: redis-server --maxmemory 128mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    networks:
      - rozgarhub-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Backend API ─────────────────────────────────────────────────────────────
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: rozgarhub-api
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      NODE_ENV: production
      PORT: 8000
      MONGODB_URL: mongodb://${MONGO_USERNAME:-admin}:${MONGO_PASSWORD:-password}@mongodb:27017/rozgarhub?authSource=admin
      REDIS_URL: redis://redis:6379
      SECRET_KEY: ${SECRET_KEY:?SECRET_KEY must be set (min 16 chars)}
      CLOUD_NAME: ${CLOUD_NAME}
      CLOUD_API_KEY: ${CLOUD_API_KEY}
      CLOUD_API_SECRET: ${CLOUD_API_SECRET}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost}
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - rozgarhub-network

  # ─── Frontend ────────────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: rozgarhub-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - api
    networks:
      - rozgarhub-network

# ─── Volumes ─────────────────────────────────────────────────────────────────
volumes:
  mongodb_data:
    driver: local
  redis_data:
    driver: local

# ─── Networks ────────────────────────────────────────────────────────────────
networks:
  rozgarhub-network:
    driver: bridge
